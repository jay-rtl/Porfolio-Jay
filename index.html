<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Francis Jay Rotol | IT Specialist, Network Admin, Web Developer">
  <title>Francis Jay Rotol | IT Specialist</title>

  <!-- Bootstrap -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
  <link rel="icon" href="FR.png" type="image/png" />

  <!-- Modern Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #0f172a;
      --secondary: #1e3a8a;
      --accent: #3b82f6;
      --accent-dark: #2563eb;
      --light-blue: #dbeafe;
      --bg: #f8fbff;
      --bg-soft: #eef6ff;
      --white: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --border: rgba(59, 130, 246, 0.12);
      --shadow: 0 12px 30px rgba(30, 58, 138, 0.08);
      --shadow-hover: 0 20px 45px rgba(30, 58, 138, 0.14);
      --radius: 22px;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior: smooth; }
    body { font-family:'Inter',sans-serif; background: linear-gradient(180deg, var(--bg) 0%, var(--bg-soft) 100%); color: var(--text); overflow-x:hidden; }
    section { padding:90px 0; position:relative; }
    h1,h2,h3,h4,h5 { color:var(--primary); font-weight:700; letter-spacing:-0.5px; }
    p { color: var(--muted); line-height:1.7; }

    /* Navbar */
    header { background: rgba(255,255,255,0.82); backdrop-filter: blur(14px); border-bottom: 1px solid rgba(59,130,246,0.08); position:fixed; width:100%; top:0; z-index:1000; }
    .navbar { padding:14px 0; }
    .navbar-brand img { height:42px; }
    .navbar-light .navbar-nav .nav-link { color: var(--text) !important; font-weight:600; margin-left:14px; position:relative; transition:0.3s ease; font-size:0.95rem; }
    .navbar-light .navbar-nav .nav-link::after { content:""; position:absolute; left:0; bottom:-4px; width:0%; height:2px; background: var(--accent); border-radius:10px; transition:0.3s ease; }
    .navbar-light .navbar-nav .nav-link:hover, .navbar-light .navbar-nav .nav-link.active { color: var(--accent) !important; }
    .navbar-light .navbar-nav .nav-link:hover::after, .navbar-light .navbar-nav .nav-link.active::after { width:100%; }
    .navbar-toggler { border:none; outline:none !important; box-shadow:none !important; padding:10px 12px; border-radius:12px; background: rgba(59,130,246,0.08); cursor:pointer; }
    .navbar-toggler-icon { width:32px; height:32px; filter: brightness(0.5); display:inline-block; background-size: contain; }

    /* Hero */
    #home { min-height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; padding-top:140px; padding-bottom:80px; overflow:hidden; }
    #home::before { content:""; position:absolute; width:420px; height:420px; background: radial-gradient(circle, rgba(59,130,246,0.18) 0%, rgba(59,130,246,0) 70%); top:70px; left:50%; transform:translateX(-50%); z-index:0; }
    #home::after { content:""; position:absolute; width:260px; height:260px; background: radial-gradient(circle, rgba(37,99,235,0.12) 0%, rgba(37,99,235,0) 70%); bottom:40px; right:10%; z-index:0; }
    #home .container { position:relative; z-index:2; }
    .profile-pic { width:180px; height:180px; border-radius:50%; object-fit:cover; border:6px solid rgba(255,255,255,0.95); box-shadow:0 25px 55px rgba(59,130,246,0.18); margin-bottom:20px; }
    #home h1 { font-size:3.2rem; margin-bottom:12px; }
    .subtitle { font-size:1.15rem; font-weight:600; color:var(--secondary); margin-bottom:10px; }
    .quote { font-size:1rem; font-style:italic; color:var(--muted); margin-bottom:32px; }
    .hero-buttons { display:flex; flex-wrap:wrap; justify-content:center; gap:14px; }
    .hero-buttons a { text-decoration:none; padding:12px 24px; border-radius:999px; font-weight:600; transition:0.3s ease; border:1px solid transparent; font-size:0.95rem; }
    .hero-buttons a:first-child { background:var(--accent); color:white; box-shadow:0 12px 25px rgba(59,130,246,0.22); }
    .hero-buttons a:first-child:hover { transform:translateY(-2px); background:var(--accent-dark); color:white; }
    .hero-buttons a:not(:first-child) { background:rgba(255,255,255,0.9); color:var(--secondary); border:1px solid rgba(59,130,246,0.12); box-shadow:0 4px 15px rgba(59,130,246,0.04); }
    .hero-buttons a:not(:first-child):hover { background:var(--light-blue); transform:translateY(-2px); color:var(--secondary); }

    /* Section Titles */
    section h2 { font-size:2.2rem; margin-bottom:14px; text-align:center; }
    .section-subtitle { text-align:center; max-width:760px; margin:0 auto 50px; color:var(--muted); }

    /* Shared Cards */
    .education-item, .card { background:rgba(255,255,255,0.94); border:1px solid var(--border) !important; border-radius:var(--radius) !important; box-shadow:var(--shadow); transition: all 0.35s ease; }
    .education-item:hover, .card:hover { transform:translateY(-6px); box-shadow:var(--shadow-hover); }
    .education-item { padding:28px !important; height:100%; }
    .education-item h3 { font-size:1.25rem; margin-bottom:12px; }
    .education-item ul { padding-left:20px; margin-top:10px; }
    .education-item li { color:var(--muted); margin-bottom:8px; }
    #Edu, #portfolio { background:transparent !important; }
    #Certificates, #Contact { background: rgba(255,255,255,0.55) !important; backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); }
    #Certificates img { border-radius:18px; box-shadow:var(--shadow); transition:0.3s ease; width:100%; }
    #Certificates img:hover { transform:scale(1.02); }
    #Certificates p { font-weight:500; margin-top:12px; }
    #Skills .education-item { height:100%; }
    #Skills i { color:var(--accent); min-width:22px; }
    #Album { background: linear-gradient(180deg, #f7fbff 0%, #edf5ff 100%); }
    .album-img-wrapper { position:relative; overflow:hidden; border-radius:24px; box-shadow:0 18px 40px rgba(30,58,138,0.14); }
    .album-img { width:100%; height:auto; max-height:520px; object-fit:cover; transition:transform 0.6s ease; border-radius:24px; }
    .album-img-wrapper:hover .album-img { transform:scale(1.04); }
    .album-overlay { position:absolute; bottom:0; left:0; right:0; padding:28px; background:linear-gradient(to top, rgba(15,23,42,0.82), transparent); color:white; text-align:left; }
    .album-overlay h5 { margin:0; color:white; font-size:1.25rem; font-weight:600; }
    .carousel-control-prev-icon, .carousel-control-next-icon { background-color: rgba(15,23,42,0.55); border-radius:50%; padding:18px; background-size:55%; }

    /* Portfolio Cards */
    #portfolio .card { overflow:hidden; height:100%; }
    #portfolio .card-img-top { height:220px; object-fit:cover; border-top-left-radius:22px; border-top-right-radius:22px; }
    #portfolio .card-body { padding:24px; }
    #portfolio .card h5 { font-size:1.2rem; margin-bottom:12px; }
    #portfolio .btn-dark { background:var(--accent); border:none; border-radius:999px; padding:10px 22px; font-weight:600; transition:0.3s ease; box-shadow:0 8px 18px rgba(59,130,246,0.18); }
    #portfolio .btn-dark:hover { background:var(--accent-dark); transform:translateY(-2px); }

    /* Contact */
    #Contact .btn { border-radius:999px; padding:12px 20px; font-weight:600; transition:0.3s ease; min-width:150px; }
    #Contact .btn:hover { transform:translateY(-2px); }

    /* Scroll Top */
    #scrollTopBtn { position:fixed; bottom:25px; right:25px; display:none; border:none; outline:none; background:var(--accent); color:white; cursor:pointer; padding:12px 15px; border-radius:50%; box-shadow:0 10px 25px rgba(59,130,246,0.25); z-index:999; transition:0.3s ease; }
    #scrollTopBtn:hover { background:var(--accent-dark); transform:translateY(-2px); }

    /* Footer */
    footer { background: rgba(255,255,255,0.9); text-align:center; padding:24px 15px; color:var(--muted); font-size:0.95rem; border-top:1px solid rgba(59,130,246,0.08); }
    footer a { color:var(--accent); text-decoration:none; font-weight:600; }
    footer a:hover { text-decoration:underline; }

    /* Fade Up Animation */
    .fade-up { opacity:0; transform:translateY(25px); transition: all 0.8s ease; }
    .fade-up.show { opacity:1; transform:translateY(0); }

    /* Responsive */
    @media(max-width:991px){
      .navbar-collapse { background: rgba(255,255,255,0.96); margin-top:12px; padding:14px 18px; border-radius:18px; box-shadow:var(--shadow); }
      .navbar-light .navbar-nav .nav-link { margin-left:0; padding:10px 0; }
      #home h1 { font-size:2.5rem; }
      .album-img { max-height:360px; }
    }
    @media(max-width:767px){
      section { padding:70px 0; }
      #home { padding-top:120px; }
      #home h1 { font-size:2rem; }
      .subtitle { font-size:1rem; }
      .quote { font-size:0.95rem; }
      .hero-buttons a { width:100%; max-width:260px; }
      .profile-pic { width:145px; height:145px; }
      .album-img { max-height:280px; }
      #portfolio .card-img-top { height:190px; }
      section h2 { font-size:1.8rem; }
      #Contact .btn { width:100%; max-width:250px; }
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <header>
    <nav class="navbar navbar-expand-lg navbar-light">
      <div class="container">
        <a class="navbar-brand" href="#home"><img src="img/F.png" alt="logo" /></a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
          <span class="navbar-toggler-icon"><i class="fas fa-bars fa-lg"></i></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ml-auto">
            <li class="nav-item"><a class="nav-link active" href="#home">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="#Edu">Education</a></li>
            <li class="nav-item"><a class="nav-link" href="#Skills">Skills</a></li>
            <li class="nav-item"><a class="nav-link" href="#Certificates">Certificates</a></li>
            <li class="nav-item"><a class="nav-link" href="#Album">Projects</a></li>
            <li class="nav-item"><a class="nav-link" href="#portfolio">Portfolio</a></li>
            <li class="nav-item"><a class="nav-link" href="#Contact">Contact</a></li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <!-- Hero Section -->
  <section id="home">
    <div class="container fade-up">
      <img src="img/jay.jpg" alt="Profile Picture" class="profile-pic" loading="lazy"/>
      <h1>Francis Jay Rotol</h1>
      <p class="subtitle">IT Specialist • Website Developer • Network Administrator</p>
      <p class="quote">"Striving for success in all aspects of life"</p>
      <div class="hero-buttons">
        <a href="https://github.com/jay-rtl/Porfolio-Jay/raw/main/Resume03.pdf" target="_blank">Resume</a>
        <a href="#Skills">Skills</a>
        <a href="#Certificates">Certificates</a>
        <a href="#portfolio">Portfolio</a>
        <a href="#Contact">Contact</a>
      </div>
    </div>
  </section>

  <!-- Add other sections (Education, Certificates, Skills, Album, Portfolio, Contact, Footer) here -->
  
  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Fade up animation
    const faders = document.querySelectorAll('.fade-up');
    const appearOptions = { threshold: 0.2 };
    const appearOnScroll = new IntersectionObserver(function(entries, observer){
      entries.forEach(entry => { if(entry.isIntersecting){ entry.target.classList.add('show'); observer.unobserve(entry.target); } });
    }, appearOptions);
    faders.forEach(fader => { appearOnScroll.observe(fader); });

    // Scroll to top button
    const scrollTopBtn = document.createElement('button');
    scrollTopBtn.id = 'scrollTopBtn'; scrollTopBtn.innerHTML = '<i class="fas fa-arrow-up"></i>';
    document.body.appendChild(scrollTopBtn);
    window.onscroll = function(){ scrollTopBtn.style.display = (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) ? 'block' : 'none'; };
    scrollTopBtn.onclick = function(){ window.scrollTo({ top:0, behavior:'smooth' }); };
  </script>
</body>
</html>
