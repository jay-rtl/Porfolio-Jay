<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

<nav class="custom-navbar">
  <div class="nav-container">
    
    <!-- Logo -->
    <div class="nav-logo">
      <a href="#">YourLogo</a>
    </div>

    <!-- Menu -->
    <ul class="nav-menu" id="navMenu">
      <li><a href="#">Home</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Services</a></li>
      <li><a href="#">Testimonials</a></li>
      <li><a href="#">Contact</a></li>
    </ul>

    <!-- Burger -->
    <div class="menu-toggle" id="menuToggle">
      <span></span>
      <span></span>
      <span></span>
    </div>

  </div>
</nav>

<style>
  /* Reset */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  /* Navbar */
  .custom-navbar {
    width: 100%;
    position: relative;
    z-index: 9999;
    font-family: 'DM Sans', sans-serif;
    padding: 8px 20px;
    background: rgba(8, 20, 45, 0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 18px;
    border: 1px solid rgba(120, 180, 255, 0.12);
    box-shadow: 0 8px 30px rgba(0, 20, 60, 0.25);
  }

  .nav-container {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    min-height: 48px;
    position: relative;
  }

  /* Logo */
  .nav-logo a {
    text-decoration: none !important;
    font-size: 20px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: 0.3px;
  }

  /* Desktop Menu */
  .nav-menu {
    list-style: none;
    display: flex;
    align-items: center;
    gap: 22px;
    margin: 0;
    padding: 0;
  }

  .nav-menu li {
    list-style: none;
    margin: 0;
    padding: 0;
  }

  .nav-menu li a {
    text-decoration: none !important;
    font-size: 14px;
    font-weight: 500;
    color: #d8e8ff;
    line-height: 1;
    padding: 4px 0;
    display: inline-block;
    transition: all 0.3s ease;
    border: none !important;
    box-shadow: none !important;
  }

  .nav-menu li a:hover {
    color: #7dc4ff;
  }

  /* Remove underline from Elementor/theme */
  .custom-navbar a,
  .custom-navbar a:hover,
  .custom-navbar a:focus,
  .custom-navbar a:active {
    text-decoration: none !important;
    border-bottom: none !important;
    box-shadow: none !important;
    outline: none !important;
  }

  .custom-navbar ul,
  .custom-navbar li {
    margin: 0 !important;
    padding: 0 !important;
  }

  /* Burger Button */
  .menu-toggle {
    display: none;
    width: 42px;
    height: 42px;
    cursor: pointer;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 5px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(125, 196, 255, 0.18);
    border-radius: 12px;
    transition: all 0.3s ease;
    z-index: 10001;
  }

  .menu-toggle:hover {
    background: rgba(255, 255, 255, 0.10);
  }

  .menu-toggle span {
    display: block;
    width: 20px;
    height: 2px;
    background: #ffffff;
    border-radius: 2px;
    transition: all 0.3s ease;
  }

  /* Mobile */
  @media (max-width: 768px) {
    .custom-navbar {
      padding: 8px 14px;
      border-radius: 16px;
    }

    .nav-logo a {
      font-size: 18px;
    }

    .menu-toggle {
      display: flex;
    }

    .nav-menu {
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      width: 220px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0;
      background: rgba(7, 18, 40, 0.98);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(125, 196, 255, 0.12);
      border-radius: 16px;
      padding: 10px;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.35);

      /* hidden by default */
      opacity: 0;
      visibility: hidden;
      transform: translateY(-10px);
      pointer-events: none;
      transition: all 0.3s ease;
      z-index: 10000;
    }

    .nav-menu.active {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
      pointer-events: auto;
    }

    .nav-menu li {
      width: 100%;
    }

    .nav-menu li a {
      width: 100%;
      padding: 12px 14px;
      font-size: 13px;
      border-radius: 10px;
      color: #e5f0ff;
    }

    .nav-menu li a:hover {
      background: rgba(125, 196, 255, 0.08);
      color: #7dc4ff;
    }

    /* Burger animation */
    .menu-toggle.active span:nth-child(1) {
      transform: translateY(7px) rotate(45deg);
    }

    .menu-toggle.active span:nth-child(2) {
      opacity: 0;
    }

    .menu-toggle.active span:nth-child(3) {
      transform: translateY(-7px) rotate(-45deg);
    }
  }
</style>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const toggle = document.getElementById("menuToggle");
    const menu = document.getElementById("navMenu");

    if (toggle && menu) {
      toggle.addEventListener("click", function () {
        menu.classList.toggle("active");
        toggle.classList.toggle("active");
      });

      // Close menu when clicking a link (mobile)
      const links = menu.querySelectorAll("a");
      links.forEach(link => {
        link.addEventListener("click", function () {
          menu.classList.remove("active");
          toggle.classList.remove("active");
        });
      });

      // Close when clicking outside
      document.addEventListener("click", function (e) {
        if (!toggle.contains(e.target) && !menu.contains(e.target)) {
          menu.classList.remove("active");
          toggle.classList.remove("active");
        }
      });
    }
  });
</script>
